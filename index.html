<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script type="module"src="main.js"></script>
    <div class="weather-container">
        <div class="search-box"style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);">
            <input type="text" id="message" placeholder="sharmapushkar2006" disabled>
        </div>

        <div class="weather-info">
            <h2 style="font-size: 74px;"id="temperature">0°C</h2>
            <p class="description"id="max_min_temp">temp_max: 0°C, temp_min: 0°C</p>
            <p class="humidity" id="uvindex">UV Index: 0</p>

    </div>

</body>
</html>
